name: safeher_bangladesh
description: SafeHer Bangladesh - AI-Driven Platform for Women Safety
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^12.0.0

  # MAPS — Free OpenStreetMap (works on web & mobile, no key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Connectivity
  connectivity_plus: ^6.0.5

  # UUID
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
